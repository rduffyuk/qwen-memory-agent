<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>qwen-memory-agent — memory inspector</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='6' fill='%237b3fe4'/%3E%3Ccircle cx='8' cy='8' r='2.5' fill='%2322d3ee'/%3E%3C/svg%3E">
<style>
  :root {
    --bg: #0b0e14; --panel: #11151d; --panel-2: #161b26; --border: #232a38;
    --text: #dbe2ee; --muted: #7d8aa0; --accent: #7b3fe4; --cyan: #22d3ee;
    --ok: #34d399; --warn: #f59e0b; --dead: #64748b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--panel);
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--dead); }
  .dot.ok { background: var(--ok); }
  #usage { margin-left: auto; color: var(--muted); font-size: 12px; white-space: nowrap; }
  #usage b { color: var(--cyan); font-weight: 600; }
  main { flex: 1; display: grid; grid-template-columns: minmax(340px, 42%) 1fr; min-height: 0; }
  section { display: flex; flex-direction: column; min-height: 0; }
  #chat-panel { border-right: 1px solid var(--border); }
  .panel-title {
    padding: 8px 14px; font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  #log { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 92%; padding: 8px 12px; border-radius: 10px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #223; border: 1px solid #334; }
  .msg.agent { align-self: flex-start; background: var(--panel-2); border: 1px solid var(--border); }
  .msg.sys { align-self: center; color: var(--warn); font-size: 12px; background: none; }
  .chips { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font-size: 11px; padding: 1px 8px; border-radius: 999px;
    border: 1px solid var(--accent); color: var(--accent);
  }
  .chip.tok { border-color: var(--cyan); color: var(--cyan); }
  form { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); background: var(--panel); }
  input, button {
    font: inherit; color: var(--text); background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
  }
  input:focus { outline: 1px solid var(--accent); }
  #message { flex: 1; }
  #session { width: 90px; } #budget { width: 74px; }
  button { cursor: pointer; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  button:disabled { opacity: .5; cursor: wait; }
  #mem-panel { min-height: 0; }
  #mem-wrap { flex: 1; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 7px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { position: sticky; top: 0; background: var(--panel); color: var(--muted); font-size: 11px;
       letter-spacing: .08em; text-transform: uppercase; font-weight: 600; }
  tr.superseded td { color: var(--dead); }
  tr.superseded td.text-cell { text-decoration: line-through; }
  tr.new-row { animation: flash 1.6s ease-out; }
  @keyframes flash { from { background: rgba(123, 63, 228, .28); } to { background: transparent; } }
  .badge { font-size: 11px; padding: 1px 8px; border-radius: 999px; border: 1px solid; white-space: nowrap; }
  .badge.active { color: var(--ok); border-color: var(--ok); }
  .badge.superseded { color: var(--dead); border-color: var(--dead); }
  .sal { display: inline-block; width: 64px; height: 7px; border-radius: 4px; background: #202737;
         overflow: hidden; vertical-align: middle; margin-right: 6px; }
  .sal i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--cyan)); }
  .muted { color: var(--muted); font-size: 12px; }
  #dream-panel { border-top: 1px solid var(--border); max-height: 38%; display: flex; flex-direction: column; }
  #proposals { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }
  .prop { display: flex; gap: 10px; align-items: flex-start; background: var(--panel-2);
          border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; }
  .prop .kind { color: var(--cyan); font-weight: 600; text-transform: uppercase; font-size: 11px; }
  .prop.invalid { border-color: var(--warn); }
  .prop.invalid .kind { color: var(--warn); }
</style>
</head>
<body>
<header>
  <span class="dot" id="health-dot"></span>
  <h1>qwen-memory-agent <span>/ memory inspector</span></h1>
  <span id="usage">usage: —</span>
</header>
<main>
  <section id="chat-panel">
    <div class="panel-title">Chat — Qwen function-calling agent</div>
    <div id="log"></div>
    <form id="chat-form">
      <input id="message" placeholder="Tell it something to remember…" autocomplete="off" autofocus>
      <input id="session" value="demo" title="session_id">
      <input id="budget" type="number" value="1024" min="1" title="token_budget">
      <button class="primary" id="send">Send</button>
    </form>
  </section>
  <section id="mem-panel">
    <div class="panel-title">
      Live memory store — polls /memory/export
      <span class="muted" id="mem-count"></span>
    </div>
    <div id="mem-wrap">
      <table>
        <thead>
          <tr><th>Memory</th><th>Subject</th><th>Type</th><th>Salience</th><th>Recalls</th><th>Status</th></tr>
        </thead>
        <tbody id="mem-body"></tbody>
      </table>
    </div>
    <div id="dream-panel">
      <div class="panel-title">
        Dreaming loop — propose → human approve → apply
        <button id="dream-btn" style="margin-left:auto">Dream</button>
        <button id="apply-btn" class="primary" disabled>Apply approved</button>
      </div>
      <div id="proposals"><span class="muted" style="padding:4px 2px">No proposals yet — press Dream.</span></div>
    </div>
  </section>
</main>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
const log = $("log");
let knownIds = new Set();
let lastProposals = [];

function addMsg(cls, text, chips = []) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  if (chips.length) {
    const c = document.createElement("div");
    c.className = "chips";
    for (const { label, tok } of chips) {
      const s = document.createElement("span");
      s.className = "chip" + (tok ? " tok" : "");
      s.textContent = label;
      c.appendChild(s);
    }
    div.appendChild(c);
  }
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function api(path, opts) {
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error(path + " -> HTTP " + res.status + ": " + (await res.text()).slice(0, 300));
  return res.json();
}

$("chat-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const message = $("message").value.trim();
  if (!message) return;
  $("message").value = "";
  addMsg("user", message);
  $("send").disabled = true;
  try {
    const body = {
      message,
      session_id: $("session").value || "demo",
      token_budget: Number($("budget").value) || 1024,
    };
    const r = await api("/chat", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(body),
    });
    const chips = r.tool_calls_made.map((t) => ({ label: "tool: " + t }));
    if (r.usage && r.usage.total_tokens) chips.push({ label: r.usage.total_tokens + " tok", tok: true });
    addMsg("agent", r.answer || "(no answer)", chips);
  } catch (err) {
    addMsg("sys", String(err));
  } finally {
    $("send").disabled = false;
    refresh();
  }
});

function salBar(v) {
  const pct = Math.round(Math.max(0, Math.min(1, v)) * 100);
  return `<span class="sal"><i style="width:${pct}%"></i></span>${v.toFixed(2)}`;
}

async function refresh() {
  try {
    const [exp, usage] = await Promise.all([api("/memory/export"), api("/usage")]);
    $("health-dot").className = "dot ok";
    const models = Object.keys(usage.by_model || {}).join(" + ") || "—";
    $("usage").innerHTML =
      `usage: <b>${usage.total_calls}</b> calls · <b>${usage.total_tokens}</b> tokens · ${models}`;
    const records = (exp.json.records || []).map((e) => e.record);
    records.sort((a, b) =>
      (a.superseded_by ? 1 : 0) - (b.superseded_by ? 1 : 0) || (a.ts < b.ts ? 1 : -1)
    );
    const active = records.filter((r) => !r.superseded_by).length;
    $("mem-count").textContent = `${active} active · ${records.length - active} superseded`;
    const body = $("mem-body");
    body.innerHTML = "";
    for (const r of records) {
      const tr = document.createElement("tr");
      const isNew = !knownIds.has(r.id);
      tr.className = (r.superseded_by ? "superseded" : "") + (isNew && knownIds.size ? " new-row" : "");
      tr.innerHTML =
        `<td class="text-cell">${esc(r.text)}</td>` +
        `<td class="muted">${esc(r.subject)}</td>` +
        `<td class="muted">${esc(r.type)}</td>` +
        `<td>${salBar(r.salience)}</td>` +
        `<td>${r.access_count}</td>` +
        `<td><span class="badge ${r.superseded_by ? "superseded" : "active"}">` +
        `${r.superseded_by ? "superseded" : "active"}</span></td>`;
      body.appendChild(tr);
    }
    knownIds = new Set(records.map((r) => r.id));
  } catch (err) {
    $("health-dot").className = "dot";
    $("usage").textContent = "usage: offline (" + String(err).slice(0, 60) + "…)";
  }
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
  );
}

$("dream-btn").addEventListener("click", async () => {
  $("dream-btn").disabled = true;
  try {
    const r = await api("/dream", { method: "POST" });
    lastProposals = r.proposals || [];
    const box = $("proposals");
    box.innerHTML = "";
    if (!lastProposals.length) {
      box.innerHTML = '<span class="muted" style="padding:4px 2px">No proposals — store too small or nothing to consolidate.</span>';
    }
    for (const p of lastProposals) {
      const div = document.createElement("div");
      div.className = "prop";
      div.innerHTML =
        `<input type="checkbox" data-id="${esc(p.id)}">` +
        `<div><span class="kind">${esc(p.kind)}</span> — ${esc(p.rationale)}` +
        `<div class="muted">targets: ${p.target_ids.map(esc).join(", ")}` +
        (p.new_salience != null ? ` · new salience ${p.new_salience}` : "") + `</div></div>`;
      box.appendChild(div);
    }
    $("apply-btn").disabled = !lastProposals.length;
  } catch (err) {
    addMsg("sys", String(err));
  } finally {
    $("dream-btn").disabled = false;
  }
});

$("apply-btn").addEventListener("click", async () => {
  const approved = [...document.querySelectorAll("#proposals input:checked")].map((i) => i.dataset.id);
  if (!approved.length) { addMsg("sys", "Tick at least one proposal to approve."); return; }
  $("apply-btn").disabled = true;
  try {
    const r = await api("/dream/apply", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ proposals: lastProposals, approved_ids: approved }),
    });
    addMsg("sys", `dream applied: ${JSON.stringify(r)}`);
    $("proposals").innerHTML = '<span class="muted" style="padding:4px 2px">Applied. Press Dream again for a fresh pass.</span>';
    lastProposals = [];
  } catch (err) {
    addMsg("sys", String(err));
  } finally {
    refresh();
  }
});

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
